server:
  port: 8081

spring:
  config:
    # Reads /run/secrets/* as properties when running in Docker with secrets.
    import: optional:configtree:/run/secrets/
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/user_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD_SECRET:}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  cache:
    type: redis
  session:
    store-type: redis
    timeout: 5m
    redis:
      namespace: chatassist:session
  mvc:
    async:
      request-timeout: 30000

# Allows local fallback if someone wants to temporarily run without Eureka.
chatassist:
  discovery:
    enabled: ${CHATASSIST_DISCOVERY_ENABLED:true}
  support-admin:
    seed:
      enabled: ${CHATASSIST_SUPPORT_ADMIN_SEED_ENABLED:true}
      default-password: ${CHATASSIST_SUPPORT_ADMIN_DEFAULT_PASSWORD:AidAdmin@123}
      include-third: ${CHATASSIST_SUPPORT_ADMIN_INCLUDE_THIRD:false}

eureka:
  client:
    enabled: ${chatassist.discovery.enabled}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${spring.application.name}}
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# SpringDoc OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

