server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      # Global CORS policy for REST API routes.
      # SockJS/WebSocket CORS for /ws-chat/** is handled by chat-service.
      globalcors:
        cors-configurations:
          '[/api/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # User Service routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>/?.*), /api/users$\{segment}

        # Chat Service routes
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chats/**
          filters:
            - RewritePath=/api/chats(?<segment>/?.*), /api/chats$\{segment}

        # Chat Service WebSocket routes
        - id: chat-websocket
          uri: lb:ws://chat-service
          predicates:
            - Path=/ws-chat/**
          filters:
            - RewritePath=/ws-chat(?<segment>/?.*), /ws-chat$\{segment}

        # Bot Service routes
        - id: bot-service
          uri: lb://bot-service
          predicates:
            - Path=/api/bots/**
          filters:
            - RewritePath=/api/bots(?<segment>/?.*), /api/bots$\{segment}

        # Aid Service routes
        - id: aid-service
          uri: lb://aid-service
          predicates:
            - Path=/api/aids/**
          filters:
            - RewritePath=/api/aids(?<segment>/?.*), /api/aids$\{segment}

        # UI catch-all — must be LAST so API/WS routes take priority
        - id: chat-ui
          uri: http://chat-assist-ui:80
          predicates:
            - Path=/**
          order: 9999


# Allow dynamic discovery toggle for local dev
chatassist:
  discovery:
    enabled: ${CHATASSIST_DISCOVERY_ENABLED:true}

eureka:
  client:
    enabled: ${chatassist.discovery.enabled}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always


