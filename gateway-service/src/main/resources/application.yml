server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
  session:
    store-type: redis
    timeout: 5m
    redis:
      namespace: chatassist:session
  cloud:
    gateway:
      # Global CORS policy for REST API routes.
      # SockJS/WebSocket CORS for /ws-chat/** is handled by chat-service.
      globalcors:
        cors-configurations:
          '[/api/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # User Service routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>/?.*), /api/users$\{segment}

        # Chat Service routes
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chats/**
          filters:
            - RewritePath=/api/chats(?<segment>/?.*), /api/chats$\{segment}
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        # Chat Service WebSocket routes
        - id: chat-websocket
          uri: lb:ws://chat-service
          predicates:
            - Path=/ws-chat/**
          filters:
            - RewritePath=/ws-chat(?<segment>/?.*), /ws-chat$\{segment}
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        # Bot Service routes
        - id: bot-service
          uri: lb://bot-service
          predicates:
            - Path=/api/bots/**
          filters:
            - RewritePath=/api/bots(?<segment>/?.*), /api/bots$\{segment}

        # Aid Service routes
        - id: aid-service
          uri: lb://aid-service
          predicates:
            - Path=/api/aids/**
          filters:
            - RewritePath=/api/aids(?<segment>/?.*), /api/aids$\{segment}

        # UI catch-all — must be LAST so API/WS routes take priority
        - id: chat-ui
          uri: http://aidconnect-ui:80
          predicates:
            - Path=/**
          order: 9999


# Allow dynamic discovery toggle for local dev
chatassist:
  auth:
    force-relogin-enabled: ${CHATASSIST_AUTH_FORCE_RELOGIN_ENABLED:true}
    absolute-timeout-ms: ${CHATASSIST_AUTH_ABSOLUTE_TIMEOUT_MS:300000}
  discovery:
    enabled: ${CHATASSIST_DISCOVERY_ENABLED:true}

eureka:
  client:
    enabled: ${chatassist.discovery.enabled}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${spring.application.name}}
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always


