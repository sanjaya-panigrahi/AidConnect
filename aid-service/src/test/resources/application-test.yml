spring:
  application:
    name: aid-service-test
  datasource:
    url: jdbc:mysql://localhost:3306/aid_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: test_user
    password: test_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: redis

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: aid-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.chatassist.common.dto
        spring.json.value.default.type: com.chatassist.common.dto.ChatMessageEvent
    # Prevent listener from auto-starting unless explicitly started in tests
    listener:
      auto-startup: false

  ai:
    openai:
      api-key: test-key-for-integration-tests
      chat:
        options:
          model: gpt-4o-mini

chatassist:
  discovery:
    enabled: false

services:
  user-service:
    base-url: http://localhost:8081
  chat-service:
    base-url: http://localhost:8082

logging:
  level:
    root: WARN
    com.chatassist: DEBUG
    org.hibernate.SQL: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    org.springframework.ai: WARN

